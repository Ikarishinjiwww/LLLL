<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>მეიმეი</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Nunito:wght@400;600;700&family=Space+Mono:wght@400;700&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#E59ABA">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="მეიმეი">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
:root{
  --jp:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN','Yu Gothic','PingFang SC','Microsoft YaHei',sans-serif;
  --ui:'Nunito',var(--jp); --mono:'Space Mono',ui-monospace,monospace; --disp:'Zen Maru Gothic',var(--jp);
  /* 浅浅粉粉 · 长读不刺眼 */
  --paper:#FDF6F9; --card:#FFFFFF; --card2:#FFFBFD; --ink:#3E3138; --soft:#927C85; --faint:#BCA9B2;
  --line:#F4E3EC; --line2:#FBEFF4;
  --accent:#ED9DBB; --accent-wash:#FCEBF2; --accent-deep:#C0759B; --accent-deeper:#A86589;
  --hair:#ECCCD9; --sep:#CDB8C0; --theme:#E59ABA;
  --ok:#5C8A6C; --ok-wash:#E9F1EB; --ok-line:#C8E0CF; --ok-deep:#3F6E4F;
  --no:#C25E48; --no-wash:#FBE7E1; --no-line:#F0CDC2; --no-deep:#9E4631;
  --ref-wash:#FBEAF1; --shadow:0 1px 2px rgba(150,80,115,.05),0 10px 30px rgba(150,80,115,.08); --shadow-sm:0 1px 2px rgba(150,80,115,.05),0 4px 14px rgba(150,80,115,.06);
  --cpad:24px; /* 復習トラック: 内容水平 padding。断点で上書き(phone 16) */
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0}
body{font-family:var(--ui);color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;padding-top:var(--topbar-h,52px)} /* padding-top: fixed 顶栏脱流, 内容整体下推一个顶栏高度; --topbar-h 由 JS 实测写入(见 boot 前 IIFE), 52px 为 JS 跑前的回退值 */
button{font-family:inherit;cursor:pointer;color:inherit}
:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}
.jp{font-family:var(--jp)}
.mono{font-family:var(--mono)}
.hide{display:none!important}

/* topbar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:20;background:var(--paper);
  border-bottom:1px solid var(--line)}
/* ↑ v1.2.11: sticky→fixed 根治顶栏闪。真机定位: 顶栏 sticky 处吸顶态(滚下去后)时, #view 任何重渲(回流)都会让浏览器重算吸顶层位置 → 顶栏空一帧 (不需有滚动变化, innerHTML 重渲的回流即触发)。fixed 不参与滚动流、无吸顶↔自然位状态机, 回流动不了它。代价: 脱流后需给内容补 padding-top = 顶栏高度 (见 body 的 var(--topbar-h), 由 JS ResizeObserver 实测, 见 boot 前 IIFE)。历经 backdrop-filter(v1.2.8)/translateZ(v1.2.9)/keepScroll(v1.2.10) 三招均未触及 sticky 机制故全无效 */
.tb-in{max-width:var(--cmax,1120px);margin:0 auto;padding:11px var(--cpad);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.tb-l{justify-self:start;display:flex;align-items:center;gap:8px;min-width:0}
.tb-r{justify-self:end;display:flex;align-items:center;gap:8px;min-width:0}
.brand{justify-self:center}
.brand{display:inline-flex;align-items:center;color:var(--accent-deep);background:none;border:none;padding:0;cursor:pointer}
.brand .brandmark{height:18px;width:auto;display:block}
.tb-sp{flex:1}
.tb-btn{font-size:12.5px;font-weight:600;color:var(--soft);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:6px 11px;height:30px;box-sizing:border-box;display:inline-flex;align-items:center;justify-content:center}
@media(hover:hover){.tb-btn:hover{border-color:var(--accent);color:var(--accent-deep)}}
.lang{display:flex;align-items:stretch;height:30px;box-sizing:border-box;border:1px solid var(--line);border-radius:9px;overflow:hidden;font-size:12px;background:var(--card)}
.lang button{display:flex;align-items:center}
.lang button{padding:6px 11px;color:var(--soft);background:none;border:none;font-weight:600}
.lang button.on{background:var(--ink);color:#fff}

/* layout */
.wrap{max-width:var(--cmax);margin:0 auto;padding:22px var(--cpad) 80px}
.runner{display:grid;grid-template-columns:64px 1fr;gap:0;max-width:760px;margin:0 auto;
  background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.rail{background:var(--card2);border-right:1px solid var(--line);padding:14px 0;display:flex;flex-direction:column;align-items:center;gap:3px}
.rk{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--faint);margin-bottom:6px;writing-mode:vertical-rl;text-orientation:upright}
.tab{width:40px;padding:6px 0;text-align:center;border-radius:7px;font-size:12.5px;color:var(--soft);font-weight:600;border:none;background:none}
.tab.on{background:var(--accent);color:#fff}
.tab .done{display:block;font-size:8px;color:var(--ok);margin-top:1px}
.tab.on .done{color:#f3dde6}
.tab.clickable{cursor:pointer}
@media(hover:hover){.tab.clickable:hover:not(.on){background:var(--accent-wash);color:var(--accent-deep)}}
.rbody{padding:18px 22px 24px;min-width:0}

/* question chrome */
.qhd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:13px}
.qhd-l{display:flex;align-items:flex-start;gap:10px;min-width:0} /* 戻る を上端揃えに → 右上の ホーム と同じ高さ */
.qback{font-family:var(--jp);font-size:12px;font-weight:600;color:var(--soft);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:5px 11px;cursor:pointer;flex:none}
@media(hover:hover){.qback:hover{border-color:var(--accent);color:var(--accent-deep)}}
.qhd .crs{font-size:11.5px;color:var(--soft);font-weight:600}
.qhd .crs b{display:block;color:var(--ink);font-size:14px;font-weight:700;margin-top:2px}
.qnum{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;color:var(--soft);margin-bottom:15px;flex-wrap:wrap}
.qnum .n{font-weight:700;color:var(--accent);font-size:12.5px}
.qnum .mode{font-family:var(--ui);font-weight:600;color:var(--soft);font-size:11px;border:1px solid var(--line);border-radius:999px;padding:2px 9px}
.qnum .prog{margin-left:auto}
.qtimer{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-weight:700;font-size:12.5px;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--accent-wash);border-radius:999px;padding:3px 11px;flex:none}
.qtimer .qt-ic{display:inline-flex}.qtimer .qt-ic svg{width:13px;height:13px;display:block}
.qtext{font-family:var(--jp);font-size:16px;line-height:1.85;font-weight:500;margin-bottom:16px;letter-spacing:.01em;white-space:pre-wrap}

/* options */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--line);
  border-radius:12px;padding:13px 13px;font-family:var(--jp);font-size:14.5px;color:var(--ink);transition:border-color .12s,background .12s}
@media(hover:hover){.opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-wash)}}
.opt:disabled{cursor:default}
.opt .mk{flex:none;width:23px;height:23px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-size:12px;color:var(--soft);font-weight:700}
.opt.ok{border-color:var(--ok-line);background:var(--ok-wash)}
.opt.ok .mk{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.no{border-color:var(--no-line);background:var(--no-wash)}
.opt.no .mk{background:transparent;border-color:var(--no);color:var(--no)}
.opt .lbl{margin-left:auto;font-family:var(--ui);font-size:10.5px;font-weight:700;letter-spacing:.04em}
.opt.ok .lbl{color:var(--ok-deep)} .opt.no .lbl{color:var(--no-deep)}

/* reveal layer */
.reveal{margin-top:4px}
.reveal.anim{opacity:0;transform:translateY(6px);animation:rise .26s ease forwards}
@keyframes rise{to{opacity:1;transform:none}}
.revcap{display:flex;align-items:center;gap:10px;margin:18px 0 6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--faint);text-transform:uppercase}
.revcap::before,.revcap::after{content:"";height:1px;background:var(--line);flex:1}
.crumb{font-family:var(--mono);font-size:10.5px;color:var(--soft);display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:12px 0}
.crumb b{font-family:var(--jp);color:var(--accent-deep);font-weight:700}
.crumb .jp2{font-family:var(--jp)} .crumb .sep{color:var(--sep)}
.tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:11px;color:var(--soft);border:1px solid var(--line);border-radius:6px;padding:2px 9px;background:var(--card2);font-family:var(--jp)}
.tag.kind{background:var(--accent-wash);border-color:var(--hair);color:var(--accent-deep);font-weight:600}
.expl{background:var(--accent-wash);border-radius:12px;padding:13px 15px;margin-bottom:12px}
.expl .et{font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--accent-deep);text-transform:uppercase;margin-bottom:6px}
.expl p{margin:0;font-family:var(--jp);font-size:13.5px;line-height:1.82;color:var(--ink)}
.more{margin-top:9px;font-size:12px;color:var(--accent-deep);font-weight:600;background:none;border:none;padding:0}
.more::before{content:"▸ ";font-size:10px}
.more.open::before{content:"▾ "}
.longx{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line)}
.trail{background:var(--ref-wash);border:1px solid var(--line);border-radius:12px;padding:12px 15px}
.trail .tt{font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;color:var(--accent-deep);text-transform:uppercase;margin-bottom:9px}
.trail .step{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:4px 0}
.trail .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none}
.trail .cn{font-family:var(--jp);font-weight:500;color:var(--ink)}
.trail .cn.dis{color:var(--faint);text-decoration:line-through}
.trail .og{font-family:var(--mono);font-size:10px;color:var(--soft);margin-left:auto}

/* subjective */
.ta-wrap{margin-bottom:14px}
textarea.answer{width:100%;min-height:120px;background:var(--card2);border:1.5px solid var(--line);border-radius:12px;
  padding:12px 13px;font-family:var(--jp);font-size:14px;line-height:1.8;color:var(--ink);resize:vertical}
textarea.answer:focus{outline:none;border-color:var(--accent)}
.ta-ro{background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:14px}
.ta-ro .tl{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--soft);text-transform:uppercase;margin-bottom:7px}
.ta-ro p{margin:0;font-family:var(--jp);font-size:13px;line-height:1.78;color:var(--ink);white-space:pre-wrap}
.model{background:var(--ok-wash);border:1px solid var(--ok-line);border-radius:12px;padding:12px 15px;margin-bottom:13px}
.model .et{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--ok-deep);text-transform:uppercase;margin-bottom:6px}
.model p{margin:0;font-family:var(--jp);font-size:13px;line-height:1.8;color:var(--ink)}
.rubt{font-size:11.5px;color:var(--soft);font-weight:600;margin-bottom:8px;font-family:var(--jp)}
.rb{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:7px;color:var(--ink)}
.rb .ck{flex:none;width:21px;height:21px;border-radius:6px;border:1.5px solid var(--line);display:grid;place-items:center;font-size:12px;color:var(--soft);margin-top:1px}
.rb.hit{border-color:var(--ok-line);background:var(--ok-wash)} .rb.hit .ck{background:var(--ok);border-color:var(--ok);color:#fff}
.rb .rt{font-family:var(--jp);font-size:13px;line-height:1.7}
.rb .rc{display:inline-block;margin-top:4px;font-family:var(--mono);font-size:9.5px;color:var(--soft)}
.rb.hit .rc{color:var(--ok-deep)}
.scoreline{display:flex;align-items:center;gap:10px;margin:14px 0 4px;font-family:var(--jp);font-size:13px;color:var(--soft)}
.scoreline b{font-family:var(--mono);font-size:20px;color:var(--accent-deep)}

/* generic cards / buttons */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
.btn{font-family:var(--ui);font-size:14px;font-weight:700;border:none;border-radius:11px;padding:12px 18px;background:var(--accent);color:#fff;transition:transform .12s var(--curve),background .15s}
.btn:hover{background:var(--accent-deep)}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent-deep)}
.btn.sm{font-size:12.5px;padding:8px 13px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.muted{color:var(--soft);font-size:13px;line-height:1.75}
.chip{font-family:var(--ui);font-size:13px;border:1.5px solid var(--line);background:var(--card);color:var(--soft);border-radius:999px;padding:7px 14px;font-weight:600}
@media(hover:hover){.chip:hover{border-color:var(--accent);color:var(--accent-deep)}}
.chip .c{font-family:var(--mono);font-size:10.5px;color:var(--accent);margin-left:6px}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}.chip.on .c{color:#f3dde6}

/* home */
.hero{margin-bottom:20px}
.hero .kick{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700}
.hero h1{font-size:23px;font-weight:700;margin:8px 0 0;letter-spacing:.01em}
.hero .sub{font-family:var(--jp);color:var(--soft);font-size:13.5px;margin-top:7px}
.acts{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-top:18px}
.act{display:flex;flex-direction:column;align-items:flex-start;gap:6px;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:16px 17px;box-shadow:var(--shadow)}
@media(hover:hover){.act:hover{border-color:var(--accent);transform:translateY(-1px)}}
.act .ic{font-size:19px;line-height:1}
.act .t{font-weight:700;font-size:15px;font-family:var(--jp)}
.act .d{font-family:var(--jp);font-size:12px;color:var(--soft);line-height:1.6}
.act.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.act.primary .d{color:#f5dee8}
.act.cont{border-color:var(--accent-wash);background:var(--accent-wash)}
.hint{display:flex;align-items:flex-start;gap:11px;background:var(--accent-wash);border:1px solid var(--hair);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-family:var(--jp);font-size:12.5px;color:var(--accent-deep);line-height:1.7}
.hint button{margin-left:auto;flex:none;background:none;border:none;color:var(--accent-deep);font-weight:700;font-size:16px;line-height:1}

/* lists */
.listrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:8px;color:var(--ink)}
@media(hover:hover){.listrow:hover{border-color:var(--accent);background:var(--card2)}}
.listrow .lead{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700;flex:none;min-width:38px}
.listrow .main{font-family:var(--jp);font-size:13.5px;min-width:0}
.listrow .main small{display:block;color:var(--soft);font-size:11.5px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:520px}
.listrow .cnt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--soft);flex:none}
.barbg{height:7px;background:var(--line2);border-radius:999px;overflow:hidden;flex:1;min-width:60px}
.barfg{height:100%;background:var(--accent);border-radius:999px}

/* section header */
.sechd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sechd h2{font-size:18px;font-weight:700;margin:0;font-family:var(--jp)}
.back{font-size:12.5px;color:var(--soft);background:none;border:none;font-weight:600}
.back:hover{color:var(--accent-deep)}
.subtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

/* result */
.bigscore{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.bigscore .pct{font-family:var(--mono);font-size:46px;font-weight:700;color:var(--accent-deep);line-height:1}
.bigscore .frac{font-family:var(--mono);font-size:14px;color:var(--soft)}
.statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
.statbox{background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:12px;text-align:center}
.statbox .n{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink)}
.statbox .l{font-family:var(--jp);font-size:11px;color:var(--soft);margin-top:4px}
.weakwrap{margin:16px 0}
.weakrow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.weakrow .nm{font-family:var(--jp);font-size:13px;color:var(--accent-deep);font-weight:600;background:none;border:none;text-align:left;padding:0}
.weakrow .nm:hover{text-decoration:underline}
.aibox{background:var(--ref-wash);border:1px solid var(--line);border-radius:13px;padding:15px;margin:16px 0}
.aibox .et{font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--accent-deep);text-transform:uppercase;margin-bottom:8px}
.aibox p{font-family:var(--jp);font-size:12.5px;line-height:1.78;color:var(--ink);margin:0 0 10px}
.promptbox{background:var(--card);border:1px dashed var(--line);border-radius:9px;padding:11px 13px;font-family:var(--jp);font-size:12px;line-height:1.7;color:var(--ink);white-space:pre-wrap;margin-bottom:9px}
.rest{font-family:var(--jp);font-size:12.5px;color:var(--soft);text-align:center;margin:14px 0;font-style:italic}

/* modal */
.modal{position:fixed;inset:0;z-index:50;background:rgba(51,39,45,.4);display:grid;place-items:center;padding:18px}
.modal-in{background:var(--card);border-radius:16px;max-width:560px;width:100%;max-height:86vh;overflow:auto;padding:22px;box-shadow:0 24px 60px rgba(80,40,55,.25)}
.modal-in h3{margin:0 0 12px;font-size:17px;font-family:var(--jp)}
.modal-x{float:right;background:none;border:none;font-size:20px;color:var(--soft);line-height:1}
.kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13px;font-family:var(--jp)}
.kv .v{font-family:var(--mono);color:var(--accent-deep)}
.checkline{display:flex;align-items:center;gap:9px;font-family:var(--jp);font-size:12.5px;color:var(--ink);margin:12px 0}

/* dev panel */
.devbtn{position:fixed;right:14px;bottom:14px;z-index:40;background:#33272D;color:#fff;border:none;border-radius:999px;font-family:var(--mono);font-size:11px;font-weight:700;padding:9px 13px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.devpanel{position:fixed;inset:0;z-index:60;background:rgba(20,12,16,.55);display:grid;place-items:end stretch}
.dev-in{background:#fff;max-height:90vh;overflow:auto;border-top-left-radius:18px;border-top-right-radius:18px;padding:20px;font-size:12.5px}
.dev-in h3{margin:0 0 4px;font-family:var(--mono);font-size:14px}
.dev-sec{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin:12px 0}
.dev-sec h4{margin:0 0 9px;font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--soft)}
.devtable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
.devtable th,.devtable td{border-bottom:1px solid var(--line);padding:5px 7px;text-align:left}
.devtable td.flag{color:var(--no-deep);font-weight:700;font-family:var(--jp)}
.devbad{color:var(--no-deep);font-weight:700}.devwarn{color:#9a6b1e}.devok{color:var(--ok-deep)}
.pill2{display:inline-block;font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:999px;border:1px solid var(--line);margin:2px}

/* === v1.1 layout: widths / dashboard / two-col manual / rest pop / explanation tiers / runner home === */
/* 復習トラック: 顶栏内侧与内容同 --cmax → 面一(項1)。narrow=880 / wide(shell)=1120 / tablet=980 */
body{--cmax:880px}
body.wide-view{--cmax:1120px}
@media(max-width:1040px){ body.wide-view{--cmax:980px} }

/* home dashboard */
.home-grid{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
.glance{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
.glance h3{margin:0 0 12px;font-size:13px;font-family:var(--jp);font-weight:700;color:var(--ink)}
.glance .gstat{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.glance .gstat b{font-family:var(--mono);font-size:30px;color:var(--accent-deep);line-height:1}
.glance .gstat span{font-family:var(--jp);font-size:12px;color:var(--soft)}
.glance .glabel{font-family:var(--jp);font-size:11.5px;color:var(--soft);margin:12px 0 7px;font-weight:600}
.glance .gweak{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.glance .gweak button{font-family:var(--jp);font-size:12.5px;color:var(--accent-deep);font-weight:600;background:none;border:none;text-align:left;padding:0;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.glance .gweak button:hover{text-decoration:underline}
.glance .gweak .gc{font-family:var(--mono);font-size:10.5px;color:var(--soft);margin-left:auto;flex:none}
.glance .gnone{font-family:var(--jp);font-size:12px;color:var(--faint);line-height:1.7}
.glance .gcont{width:100%;margin-top:4px}

/* two-column manual */
.manual2{display:flex;flex-direction:column;gap:14px}
.mnav,.mdetail{min-width:0}
.mnav .card,.mdetail .card{margin:0}
.mempty{background:var(--card);border:1px dashed var(--line);border-radius:16px;padding:34px 22px;text-align:center;color:var(--faint);font-family:var(--jp);font-size:13px;line-height:1.7}
.mback{font-size:12.5px;color:var(--soft);background:none;border:none;font-weight:600;margin-bottom:10px}
.mback:hover{color:var(--accent-deep)}
.mback::before{content:"‹ "}
.listrow.sel{border-color:var(--accent);background:var(--accent-wash)}

/* runner home button */
.qhome{font-size:12px;font-weight:600;color:var(--soft);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:5px 11px;flex:none}
.qhome::before{content:"‹ "}
@media(hover:hover){.qhome:hover{border-color:var(--accent);color:var(--accent-deep)}}

/* explanation tiers */
.exwrap{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.exblock{border-radius:12px;padding:12px 15px}
.exblock .exhd{display:flex;align-items:center;gap:9px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;font-family:var(--ui)}
.exblock .exhd::after{content:"";flex:1;height:1px}
.exblock p{margin:0;font-family:var(--jp);font-size:13.5px;line-height:1.82;color:var(--ink)}
.exblock.short{background:var(--accent-wash)}
.exblock.short .exhd{color:var(--accent-deep)} .exblock.short .exhd::after{background:var(--hair)}
.exblock.long{background:var(--card2);border:1px solid var(--line)}
.exblock.long .exhd{color:var(--soft)} .exblock.long .exhd::after{background:var(--line)}
.excol{display:grid;grid-template-rows:0fr;transition:grid-template-rows var(--q-dur) var(--curve)}
.excol[data-open="true"]{grid-template-rows:1fr}
.excol>.excol-in{overflow:hidden;min-height:0}
.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,12px);background:var(--ink);color:#fff;font-family:var(--jp);font-size:13px;padding:11px 18px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:9999;opacity:0;transition:opacity .26s,transform .26s;max-width:86%;text-align:center}
.toast.in{opacity:.97;transform:translate(-50%,0)}
@media (prefers-reduced-motion: reduce){ .excol{transition:none} .toast{transition:opacity .2s} }
.exblock.long p{font-size:13px}
.exblock.model{background:var(--ok-wash);border:1px solid var(--ok-line)}
.exblock.model .exhd{color:var(--ok-deep)} .exblock.model .exhd::after{background:var(--ok-line)}
.exmore{align-self:flex-start;font-size:12px;color:var(--accent-deep);font-weight:600;background:none;border:none;padding:0}
.exmore::before{content:"▸ ";font-size:10px} .exmore.open::before{content:"▾ "}
.exsec{margin:0}
.exsec + .exsec{margin-top:.8em}
.exseclabel{font-weight:700;color:var(--accent-deep);margin-right:.15em}
.exblock.long .exseclabel{color:var(--accent-deep)}
.exblock.model .exseclabel{color:var(--ok-deep)}

/* rest pop ― transient, never blocks input */
.restpop{position:fixed;inset:0;z-index:45;display:grid;place-items:center;pointer-events:none;padding:20px}
.restpop .rp{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px rgba(80,40,55,.18);padding:20px 26px;display:flex;flex-direction:column;align-items:center;gap:11px;max-width:300px;text-align:center}
.restpop .rp .rpt{font-family:var(--jp);font-size:13.5px;color:var(--ink);line-height:1.7}
.restpop.anim .rp{opacity:0;animation:restfade 2.8s ease forwards}
@keyframes restfade{0%{opacity:0;transform:translateY(8px)}12%{opacity:1;transform:none}78%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-4px)}}

/* 【】 inline labels: unglue from body text */
.qtext .qlabel,.rt .qlabel{display:inline-block;background:var(--accent-wash);color:var(--accent-deep);font-weight:600;font-size:.84em;padding:0 7px;border-radius:6px;margin:0 .45em 2px 0;vertical-align:baseline}

/* per-answer feedback line (choice) */
.fbk{border-radius:10px;padding:9px 13px;margin-bottom:12px;font-size:13px;font-weight:600;border:1px solid transparent}
.fbk .jp{font-family:var(--jp)}
.fbk.ok{background:var(--ok-wash);color:var(--ok-deep);border-color:var(--ok-line)}
.fbk.no{background:var(--no-wash);color:var(--no-deep);border-color:var(--no-line)}
.fbk.hi{background:linear-gradient(90deg,var(--accent-wash),var(--ok-wash));color:var(--accent-deep);border-color:#e6c6d4}
.fbkcontact{font-family:var(--jp);font-size:11.5px;color:var(--soft);line-height:1.7;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}

/* version chip in hero + updates modal */
.verchip{display:inline-flex;align-items:center;margin-top:11px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent-deep);background:var(--accent-wash);border:1px solid var(--hair);border-radius:20px;padding:3px 11px}
.updblk{margin-bottom:16px}
.updblk:last-child{margin-bottom:0}
.updv{display:flex;align-items:baseline;gap:9px;margin-bottom:7px}
.updv b{font-family:var(--mono);font-size:14px;color:var(--accent-deep)}
.updv .updd{font-family:var(--mono);font-size:11px;color:var(--soft)}
.updul{margin:0;padding-left:18px}
.updul li{font-family:var(--jp);font-size:12.5px;line-height:1.7;color:var(--ink);margin-bottom:3px}

/* action card stroke icons (replace emoji) */
.act .ic{color:var(--accent-deep)}
.act.primary .ic{color:#fff}
.act .ic svg{width:21px;height:21px;display:block}

/* runner rail: indicators only, not clickable */
.rail .tab{cursor:default}

@media(min-width:980px){
  .home-grid{grid-template-columns:minmax(0,1.7fr) minmax(250px,1fr)}
  .glance{position:sticky;top:60px}
  .manual2{flex-direction:row;align-items:flex-start}
  .manual2 .mnav{flex:0 0 300px;position:sticky;top:60px;max-height:calc(100vh - 78px);overflow:auto}
  .manual2 .mdetail{flex:1}
}
@media(max-width:979px){
  .manual2.show-nav .mdetail{display:none}
  .manual2.show-detail .mnav{display:none}
  .manual2 .mdetail.m-fade,.manual2 .mnav.m-fade{ animation:mPanelFade 340ms var(--curve) both; } /* §C 列表↔详情入场淡入(签定 340ms); 桌面两栏并存(>=980)无切换故不触发 */
}
@keyframes mPanelFade{ from{opacity:0} to{opacity:1} }
@media(max-width:600px){
  .runner{grid-template-columns:50px 1fr} .rbody{padding:14px 14px 18px} .runner.exam-answer .examstrip{padding-left:14px;padding-right:14px}
  .statgrid{grid-template-columns:1fr} .acts{grid-template-columns:1fr}
  .hero h1{font-size:20px}
}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
  .act:hover{transform:none}
  .restpop.anim .rp{opacity:1;animation:none}
}
/* ===== v1.1 网页轨 第1轮：sakura contrast + lang fix + dashboard B + new features ===== */

/* sakura contrast: accent 浅(填充/高亮)、accent-deep 用于白字按钮与强调文字（后定义胜出） */
.btn{background:var(--accent-deep)} .btn:hover{background:var(--accent-deeper)}
.btn.ghost{background:var(--card);color:var(--ink)} .btn.ghost:hover{border-color:var(--accent-deep);color:var(--accent-deep)}
.act.primary{background:var(--accent-deep);border-color:var(--accent-deep)}
.chip.on{background:var(--accent-deep);border-color:var(--accent-deep)}
.tab.on{background:var(--accent-deep)}
.qnum .n,.chip .c{color:var(--accent-deep)}
.lang button.on{background:var(--accent-deep)}

/* lang icon mobile clip fix + press feedback (§6) */
.tb-in{gap:7px}
.lang{flex:0 0 auto}

}

.fc-marks{display:flex;gap:10px;justify-content:center;margin-top:14px} /* §5-11: 覚えた/苦手 */

.fcm-weak.on{background:var(--accent-wash);border-color:var(--hair);color:var(--accent-deep)}
@media(hover:hover){.fcm:hover{border-color:var(--accent-deep)}}
.fc-hide.on{background:var(--accent-wash);border-color:var(--hair);color:var(--accent-deep)}
.flipstage{ position:relative; }
.flipstage.fc-next{ animation:fcNext var(--q-dur) var(--curve) both; }
.flipstage.fc-prev{ animation:fcPrev var(--q-dur) var(--curve) both; }
@keyframes fcNext{ from{opacity:0;transform:translateX(calc(22px * var(--k)))} to{opacity:1;transform:none} }
@keyframes fcPrev{ from{opacity:0;transform:translateX(calc(-22px * var(--k)))} to{opacity:1;transform:none} }
.flip3d{ perspective:1200px; cursor:pointer; }
.flip3d:hover .flip-face{ box-shadow:0 14px 36px rgba(150,80,115,.12); }
.flip-inner{ position:relative; min-height:230px; transform-style:preserve-3d; transition:transform var(--flip-dur) var(--curve-lift); }
.flip3d.flipped .flip-inner{ transform:rotateY(180deg); }
.flip3d.flip-instant .flip-inner{ transition:none; }
.flip-face{ position:absolute; inset:0; -webkit-backface-visibility:hidden; backface-visibility:hidden; border:1px solid var(--line); border-radius:20px; display:flex; flex-direction:column; justify-content:center; box-shadow:var(--shadow); background:var(--card); }
.fc-pad{ width:100%; box-sizing:border-box; padding:26px; text-align:center; } /* 内容包裹层: 量测它的 offsetHeight 撑容器高度 (绕开面板 flex 居中时内容向上下对称溢出、scrollHeight 漏算顶部的问题) */
.flip-back{ transform:rotateY(180deg); background:linear-gradient(180deg,var(--card),color-mix(in srgb,var(--accent-wash) 35%,#fff)); }
/* v1.3.1 Apple 式点按反馈: iOS 需 boot 前的 touchstart 监听才会触发 :active (否则手机端点按无反馈); 统一快速 scale 下压 */
.flipstage{ transition:transform .12s var(--curve); }

.ktile:active{ transform:scale(.97); }

/* ---------- Phase 2 motion (基准 v3 §9): 入场为主, 退场视差/sheet 退场留待原型; reduced-motion 由全局 *{animation:none} 兜底 ---------- */
:root{
  --k:1.45;
  --nav-dur:340ms; --q-dur:210ms; --flip-dur:480ms;
  --sheet-dur:360ms; --sheet-out-m:300ms; --sheet-out-d:260ms;
  --curve:cubic-bezier(.22,1,.36,1);
  --curve-pop:cubic-bezier(.32,.72,0,1);
  --curve-lift:cubic-bezier(.34,1.28,.64,1);
}
body[data-mode="exam"]{ --nav-dur:260ms; --curve:cubic-bezier(.32,.72,0,1); } /* §4 模考降噪: 更快更平直 (前向兼容 Brief 3 阶段机) */
/* 页面导航 (v1.3.0 方向性+视差回滚 3b, 取代 v1.2.x 的 navRise 纵向上浮): 旧屏作离场层 ― JS 在 setView 里给它 position:fixed 钉住其当前视觉位置(getBoundingClientRect, 与滚动解耦), z-index:10(顶栏 20 之下、内容之上), 在上方淡出; 新屏在 #view 内自方向滑入。卡片叠纸非满幅不透明, 真底板视差会从纸缝透出旧屏破相 → 故采「离场层在上、淡出」。变暗走 ::after 遮罩 opacity(GPU 廉价, 禁 filter:brightness)。位移走 calc(...*var(--k)) → --k 仍是单点位移总闸(基准 §7); 模考由 body[data-mode=exam] 自动得更快更平直曲线(基准 §4)。两套量级(轻档, gomi 签定): 桌面=内容刷新心智(范围限 #view 内容区), 移动=整屏页面替换心智。reduced-motion / 就地重绘(语言切换/答题揭示)走 setView 非方向性分支(瞬时原子替换=旧行为)。顶栏闪与本动画无关, v1.2.11 已 sticky→fixed 独立根治(见 33 行)。*/
:root{ --nav-enter:26; --nav-leave:14; --nav-leave-scale:.995; --nav-dim:.04; }
@media(max-width:600px){ :root{ --nav-enter:48; --nav-leave:30; --nav-leave-scale:.990; --nav-dim:.06; } }
.nav-enter-fwd{ animation:navEnterFwd var(--nav-dur) var(--curve) both; }
.nav-enter-back{ animation:navEnterBack var(--nav-dur) var(--curve) both; }
@keyframes navEnterFwd{ from{opacity:0;transform:translateX(calc(var(--nav-enter) * var(--k)))} to{opacity:1;transform:none} }
@keyframes navEnterBack{ from{opacity:0;transform:translateX(calc(-1 * var(--nav-enter) * var(--k)))} to{opacity:1;transform:none} }
.nav-leave-fwd,.nav-leave-back{ z-index:10; pointer-events:none; will-change:transform,opacity; }
.nav-leave-fwd{ animation:navLeaveFwd calc(var(--nav-dur) * .68) var(--curve-pop) forwards; }
.nav-leave-back{ animation:navLeaveBack calc(var(--nav-dur) * .68) var(--curve-pop) forwards; }
@keyframes navLeaveFwd{ from{transform:translateX(0) scale(1);opacity:1} to{transform:translateX(calc(-1 * var(--nav-leave) * var(--k))) scale(var(--nav-leave-scale));opacity:0} }
@keyframes navLeaveBack{ from{transform:translateX(0) scale(1);opacity:1} to{transform:translateX(calc(var(--nav-leave) * var(--k))) scale(var(--nav-leave-scale));opacity:0} }
.nav-leave-fwd::after,.nav-leave-back::after{ content:'';position:absolute;inset:0;background:#2A1A22;opacity:0;pointer-events:none;animation:navDim calc(var(--nav-dur) * .68) var(--curve-pop) forwards; }
@keyframes navDim{ from{opacity:0} to{opacity:var(--nav-dim)} }
/* qbody 帧内题切换 (局部内容, 比导航更轻更快; 仅 goNext/goPrev, 答题/揭示就地不触发) */
.rbody.qstep-next{ animation:qStepN var(--q-dur) var(--curve) both; }
.rbody.qstep-prev{ animation:qStepP var(--q-dur) var(--curve) both; }
@keyframes qStepN{ from{opacity:0;transform:translateX(calc(22px * var(--k)))} to{opacity:1;transform:none} }
@keyframes qStepP{ from{opacity:0;transform:translateX(calc(-22px * var(--k)))} to{opacity:1;transform:none} }
body[data-mode="exam"] .rbody.qstep-next,body[data-mode="exam"] .rbody.qstep-prev{ animation:qStepExam var(--q-dur) var(--curve) both } /* 模考: 横滑(22px*1.45≈32px)を廃し穏やかなフェードのみ → 換題時の画面の揺れ(目の疲れ)を解消; 位置指示は題号轨が担う */
@keyframes qStepExam{ from{opacity:.4} to{opacity:1} }
/* sheet/modal 入场 (桌面缩放掀起; 手机自下升起。退场动画留待原型) */
.modal{ animation:sheetOverlay var(--sheet-dur) var(--curve) both; }
.modal-in{ animation:sheetCardD var(--sheet-dur) var(--curve-lift) both; }
@keyframes sheetOverlay{ from{opacity:0} to{opacity:1} }
@keyframes sheetCardD{ from{opacity:0;transform:scale(.94)} to{opacity:1;transform:none} }
/* settle / nudge (练习专属即时反馈; 模考由 JS 门控不置 _pulse) */
.opt.settle{ animation:settle .34s var(--curve); }
.opt.nudge{ animation:nudge .42s var(--curve-pop); }
@keyframes settle{ 0%{transform:none}40%{transform:scale(1.018)}100%{transform:none} }
@keyframes nudge{ 0%,100%{transform:none}20%{transform:translateX(-3px)}45%{transform:translateX(2px)}70%{transform:translateX(-2px)} }
/* bloom (练习结果径向; 模考结果安静呈现, 不置 _bloom) */
.bigscore.bloom{ position:relative; }
.bigscore.bloom::before{ content:'';position:absolute;left:50%;top:50%;width:120px;height:120px;margin:-60px 0 0 -60px;border-radius:50%;background:radial-gradient(circle, var(--accent-wash) 0%, rgba(239,166,192,0) 70%);transform:scale(.4);opacity:0;animation:bloom 1.1s var(--curve) forwards;pointer-events:none;z-index:0; }
.bigscore.bloom>*{ position:relative; z-index:1; }
@keyframes bloom{ 0%{opacity:0;transform:scale(.4)}30%{opacity:.7}100%{opacity:0;transform:scale(1.5)} }
/* (旧版页面切换动画 .nav-exit-* / navOut* / nav-rise / nav-under 均已移除; 页面切换改即时替换, 见 setView) */
.langslide{ animation:langSlide .46s cubic-bezier(.22,1,.36,1) both } /* §5-6 方式A: 言語切替=瞬時原子入替(全体フェード廃止→空白閃なし) + 解说块のみスライドイン(問題文/選択肢は不動) */
@keyframes langSlide{ from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
/* (顶栏曾用 backdrop-filter:blur 毛玻璃, v1.2.8 去除改 paper 实色――假设证伪。v1.2.9 translateZ(0) 钉合成层、v1.2.10 keepScroll 去 scrollTo, 真机均仍闪 → 病根是 sticky 吸顶态下「任何 #view 回流都触发吸顶位置重算」, 与合成层/滚动变化均无关。v1.2.11 根治: .topbar sticky→fixed(见 33 行), 脱离滚动流。详见独立排查简报) */
/* sheet/modal 退场 (桌面缩放淡出; 手机下滑。延迟移除, 见 closeModal + 兜底超时) */
.modal.closing{ animation:sheetOverlayOut var(--sheet-out-d) var(--curve-pop) forwards; }
.modal.closing .modal-in{ animation:sheetCardOutD var(--sheet-out-d) var(--curve-pop) forwards; }
@keyframes sheetOverlayOut{ from{opacity:1} to{opacity:0} }
@keyframes sheetCardOutD{ from{opacity:1;transform:none} to{opacity:0;transform:scale(.96)} }
@media(max-width:600px){
  .modal.closing .modal-in{ animation:sheetCardOutM var(--sheet-out-m) var(--curve-pop) forwards; }
  @keyframes sheetCardOutM{ from{opacity:1;transform:none} to{opacity:0;transform:translateY(100%)} }
}
@media(max-width:600px){ /* 手机: sheet 自屏外升起 */
  @keyframes sheetCardD{ from{opacity:0;transform:translateY(100%)} to{opacity:1;transform:none} }
}

.exam-answer .qhd{margin-bottom:10px;position:relative}

    helpTitle:'使い方',
    help:'このツールは、臨床心理学概論の問題演習と復習をひとつにまとめたものです。各機能はホームから選べます ( ˘ω˘ )\n\n■ 模擬試験 / 復習\n本番形式の通し演習が「模擬試験」（ホーム上部）。「復習」は「回ごとの到達度」から、気になる回をタップ、または苦手重点・全体ランダムで始められます。選択式は自動で採点され、記述式は模範解答と照らし合わせて要点を一つずつチェックして自己採点します。\n\n■ 弱点・間違い\n間違えた問題と苦手な概念を、ひとつの画面にまとめました。「間違い」では解き直し、「苦手」では弱点の概念を一覧して関連問題へ進めます。\n\n■ 資料集\n問題を解かずに、回・テーマ・概念から読みものとしてめくれます。概念ごとに定義・出処・その概念に触れる問題がまとまっています。\n\n■ キーボード操作\n選択式は数字キー 1〜4 で解答、Enter で次の問題へ。記述式は Enter で模範解答の表示／次の問題へ進みます（解答欄に入力中は数字キーは無効です）。\n\n■ データと表示\n問題文と選択肢は常に日本語、解説は日本語／中国語を切り替えできます。進捗はこの端末にのみ保存され、自動同期はされません。「書き出し」で保存したファイルは、バックアップ・端末間の移行・AI への提出に使えます。個人を特定する情報は含みません。',

/* ---------- DOM helper ---------- */
function el(tag, attrs, kids){
  const n=document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==='class') n.className=attrs[k];
    else if(k==='html') n.innerHTML=attrs[k];
    else if(k==='text') n.textContent=attrs[k];
    else if(k.slice(0,2)==='on'&&typeof attrs[k]==='function') n.addEventListener(k.slice(2),attrs[k]);
    else if(attrs[k]!=null) n.setAttribute(k,attrs[k]);
  }
  if(kids) (Array.isArray(kids)?kids:[kids]).forEach(function(c){ if(c==null)return; n.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return n;
}
const view=()=>document.getElementById('view');
let currentView=null; // closure replayed on language change (keeps you on the same screen)
/* ---------- view history stack (Brief 2-A: 返回到正确层级, 修掉详情页一律回首页的潜伏 bug) ---------- */
let viewStack=[]; // [{key, render}]  栈顶 = 当前屏; currentView 是栈顶 render 的别名
let navDir='none'; // 一次性方向信号 (供 setView 给页面套入场动画): 'fwd' 压栈前进 / 'back' goBack·goHome 后退 / 'none' 就地重绘
let viewSwapFade=false; // 一次性: 语言切换走就地重绘 (navDir='none'), 由 setLang 置 true, setView 给新内容套一次柔和淡入后复位
let qStep='none';  // 一次性题间步进信号 (供 renderRunner 给 .rbody 套轻量转场): 'next' / 'prev' / 'none'
let keepScroll=false; // 一次性: 就地揭示(练习选项/记述答え合わせ)保位。由 answerChoice/记述揭示置 true; setView 见此则不 scrollTo(0,0), 停在原地展开揭示 → 修「滚动后点选项」顶栏闪(吸顶态被 scrollTo 强拉触发位置重算) + 不跳回顶部
function registerFrame(render,key){ // renderX 调用: 同 key 就地替换栈顶(语言重放/同屏重绘不增长栈), 异 key 压栈
  const top=viewStack[viewStack.length-1];
  const samekey=!!(top && top.key===key);
  if(!samekey && navDir!=='back') navDir='fwd'; // 异 key = 前进; goBack/goHome 已置 'back' 时不覆盖
  if(samekey){ top.render=render; }
  else viewStack.push({key:key, render:render});
  currentView=render;
}
function baseHome(){ // 把栈重置成单一 home 帧(不绘制), 供会话/结果在其上压栈, 之后返回回首页
  viewStack=[{key:'home', render:renderHome}]; currentView=renderHome;
}
function goHome(){ navDir='back'; viewStack=[]; renderHome(); } // 显式回首页: 清栈, renderHome 在空栈上压 home → [home]
function goBack(){ // 返回上一级: 先关浮层(与 Esc 统一); 栈底 no-op; 否则 pop 并重绘目标屏
  const root=document.getElementById('modalRoot');
  if(root && root.firstChild){ closeModal(); return; }
  if(viewStack.length<=1) return;
  navDir='back';
  viewStack.pop();
  const top=viewStack[viewStack.length-1];
  currentView=top.render;
  if(typeof top.render==='function') top.render();
}
function setView(node,wide){
  const wrap=document.querySelector('.wrap'); if(wrap) wrap.classList.toggle('wide',!!wide); document.body.classList.toggle('wide-view',!!wide); document.body.classList.remove('reader-view');
  const dir=navDir; navDir='none';
  try{ document.body.dataset.mode=(App.session&&App.session.mode==='exam')?'exam':'practice'; }catch(e){} // §4 模考降噪开关 (前向兼容 Brief 3)
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const v=view();
  v.style.position=''; v.style.zIndex=''; v.style.overflow=''; v.style.minHeight=''; // 防御性复位: 清掉旧版叠层方案 (v1.2.3/v1.2.6) 可能遗留的内联样式
  const directional = node && node.classList && (dir==='fwd'||dir==='back') && !reduce;
  // v1.3.0 方向性+视差导航 (回滚 3b): 旧屏作离场层 fixed 钉住当前视觉位置(与滚动解耦)在上淡出, 新屏自方向滑入; 变暗走 ::after 遮罩(禁 filter:brightness)。reduced-motion / 就地重绘(语言切换/答题揭示)走 else 分支 = 同步原子替换(旧行为, 画面始终单层、无切换残留)。首帧/启动 old 为空 → 瞬时, 不做无来由滑入。
  if(directional){
    document.querySelectorAll('.nav-leave-fwd,.nav-leave-back').forEach(function(x){ try{ x.remove(); }catch(_){} }); // 快速连点: 先清残留离场层防堆叠
    const old=v.firstElementChild;
    if(old){
      const r=old.getBoundingClientRect();
      old.style.position='fixed'; old.style.top=r.top+'px'; old.style.left=r.left+'px';
      old.style.width=r.width+'px'; old.style.height=r.height+'px'; old.style.margin='0';
      old.classList.add(dir==='fwd'?'nav-leave-fwd':'nav-leave-back');
      document.body.appendChild(old); // 移出 #view → 悬浮于内容之上(顶栏 z20 之下), 与 #view 清空解耦; fixed 故不随滚动跳位
      let od=false;
      const ocl=function(e){ if(e && e.target!==old) return; if(od) return; od=true; old.removeEventListener('animationend',ocl); try{ old.remove(); }catch(_){} };
      old.addEventListener('animationend',ocl);
      setTimeout(ocl, 700); // 兜底必清
    }
    v.innerHTML=''; v.appendChild(node); // old 已移走 → #view 清空后只挂新屏, 自然撑高 + 滚顶
    if(old){ // 有上一屏才给方向性入场 (首帧/启动 old 为空 → 瞬时)
      node.classList.add(dir==='fwd'?'nav-enter-fwd':'nav-enter-back');
      let nd=false;
      const ncl=function(e){ if(e && e.target!==node) return; if(nd) return; nd=true; node.removeEventListener('animationend',ncl); try{ node.classList.remove('nav-enter-fwd'); node.classList.remove('nav-enter-back'); }catch(_){} };
      node.addEventListener('animationend',ncl);
      setTimeout(ncl, 700);
    }
  } else {
    v.innerHTML=''; v.appendChild(node); // 就地重绘 / reduced-motion: 同步原子替换 (旧行为, 单层无残留)
  }
  if(viewSwapFade && node && node.classList){ viewSwapFade=false; try{ node.querySelectorAll('.exblock').forEach(function(x){ x.classList.add('langslide'); }); }catch(_){} } // 语言切换(方式A): 全体フェード(.viewswap)は廃止 — 開始 .4 が ~3フレーム(~48ms)薄暗く留まり「空白閃」に見えた。innerHTML 差替は同期=空白フレーム無し → 瞬時原子入替 + 解说块(.exblock)のみ langSlide(問題文/選択肢は不動)
  if(keepScroll){ keepScroll=false; } else { window.scrollTo(0,0); } // 就地揭示(keepScroll)保位: 不滚顶 → 顶栏吸顶态不被强拉重算 → 不闪; 真导航/翻题 keepScroll=false → 仍滚顶
}
function qtextNode(text,cls){ // 把题干里的【…】渲染成与正文分离的标签, 不改数据
  const wrap=el('div',{class:cls||'qtext jp'});
  const re=/【[^】]*】/g; let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last) wrap.appendChild(document.createTextNode(text.slice(last,m.index)));
    wrap.appendChild(el('span',{class:'qlabel',text:m[0]}));
    last=m.index+m[0].length;
  }
  if(last<text.length) wrap.appendChild(document.createTextNode(text.slice(last)));
  return wrap;
}
function richExplain(text){ // 把解说/模範解答里的 ［…］【…】小标题分段, 避免相邻两段粘在一起
  const box=el('div',{class:'exsecs'});
  if(text==null) return box;
  const re=/【[^】]*】|［[^］]*］/g;
  const labels=[]; let m;
  while((m=re.exec(text))!==null) labels.push({i:m.index,s:m[0],e:m.index+m[0].length});
  if(!labels.length){ box.appendChild(el('p',{class:'jp exsec',text:text})); return box; }
  if(labels[0].i>0){ const lead=text.slice(0,labels[0].i).replace(/[\s\u3000]+$/,''); if(lead.trim()) box.appendChild(el('p',{class:'jp exsec',text:lead})); }
  labels.forEach(function(lab,k){
    const bodyEnd=(k+1<labels.length)?labels[k+1].i:text.length;
    const body=text.slice(lab.e,bodyEnd).replace(/^[\s\u3000]+/,'').replace(/[\s\u3000]+$/,'');
    const sec=el('p',{class:'jp exsec'},[ el('span',{class:'exseclabel',text:lab.s}) ]);
    if(body) sec.appendChild(document.createTextNode(body));
    box.appendChild(sec);
  });
  return box;
}

async function fetchJSON(url){
  const res=await fetch(url,{cache:'no-store'});
  if(!res.ok) throw new Error('HTTP '+res.status+' @ '+url);
  return res.json();
}

async function boot(){
  App.dev=/[?&]dev=1/.test(location.search);
  document.getElementById('devBtn').classList.toggle('hide',!App.dev);
  App.lang=lsGet('quiz:lang','ja'); applyLangButtons();
  App.rng=C.makeProdRng();
  installErrorBoundary();
  document.addEventListener('keydown',onKey);
  document.addEventListener('visibilitychange',onVisibility);
  wireChrome();
  try{
    App.manifest=await fetchJSON('course-manifest.json');
  }catch(e){ return renderLoadError('course-manifest.json',e); }
  const lastId=lsGet('quiz:lastCourse',null);
  const courses=App.manifest.courses||[];
  const pick=courses.find(c=>c.id===lastId)||courses[0];
  if(!pick) return renderLoadError('course-manifest.json',new Error('no courses'));
  document.getElementById('courseBtn').classList.toggle('hide',courses.length<2);
  await loadCourse(pick);
}

async function loadCourse(meta){
  App.course=meta; lsSet('quiz:lastCourse',meta.id);
  refreshChrome();
  let questions,concepts;
  try{
    questions=await fetchJSON(meta.dir+'/questions.json');
    concepts=await fetchJSON(meta.dir+'/concepts.json');
  }catch(e){ return renderLoadError(meta.dir+'/questions.json',e); }
  App.questions=questions; App.concepts=concepts;
  App.manual=await loadManual(meta); // 復習トラック手册(増強層・任意): 缺失/不正なら null, course 載入は止めない
  App.validation=C.validateContent(questions,concepts);
  if(App.validation.fatal){ return renderRefuse(); }
  App.idx=C.buildIndices(questions,concepts);
  loadProgress();
  reconcileExam();
  renderHome();
}
async function loadManual(meta){ // 資料集リーダーのデータ源。任意: 失敗しても course を止めない
  try{
    const man=await fetchJSON(meta.dir+'/manual.json');
    if(man && man.boundTo && Array.isArray(man.units) && man.units.length) return man;
  }catch(e){}
  return null;
}

/* ---------- session model ---------- */
function quarantinedIds(){ const s=readExam(); return (s&&Array.isArray(s.ids))?s.ids:null; } // phase∈{answering,grading} 时才隔离
function isQuarantined(id){ const q=quarantinedIds(); return !!(q && q.indexOf(id)>=0); }
function toast(msg){ try{ const n=el('div',{class:'toast jp',text:msg}); document.body.appendChild(n); requestAnimationFrame(function(){ n.classList.add('in'); }); setTimeout(function(){ n.classList.remove('in'); setTimeout(function(){ if(n.parentNode) n.remove(); },300); },2600); }catch(e){} }
function newSession(mode,list,opts){
  if(mode!=='exam'){ const ql=quarantinedIds(); if(ql&&ql.length) list=list.filter(function(q){ return ql.indexOf(q.id)<0; }); }
  if(!list||!list.length){ toast(t('reviewEmptyExam')); return null; }
  App.session={ mode:mode, list:list, pos:0, opts:opts||{}, perItem:{}, results:[], streak:0, frontier:0, startAt:Date.now(), elapsedMs:0, runningSince:(mode!=='exam')?Date.now():0, answeredCount:0, lastCareElapsed:0, lastCareAnswered:0, recentWindow:[] };
  if(!(opts&&opts.from==='reader')) App.readerReturn=null; // 手册発以外の会話開始時は戻る先を破棄(旧 readerReturn の漏れ防止 → 模考等に誤って「戻る」が出ない)
  baseHome(); // 会话坐落在 [home, runner]: 退出/返回回首页
  clearCareTimer(); if(mode!=='exam') startCareTimer();
  return App.session;
}
function pushRecent(id){ App.recent.push(id); if(App.recent.length>40) App.recent.shift(); }

/* ===== mock-exam state machine (Brief 3): 盲答 answering → 批改 grading → 定稿 finalized ===== */
/* 内容指纹 (FNV-1a 32-bit): 题干 + 选项 + 评分点 + 模範解答; 恢复时逐题比对, 不符则整场作废 */
function fnv1a(str){ let h=0x811c9dc5; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,0x01000193); } return (h>>>0).toString(36); }
function contentFp(q){ const p=[q.q||'']; if(q.options) p.push(JSON.stringify(q.options)); if(q.rubric) p.push(JSON.stringify(q.rubric)); if(q.modelAnswer) p.push(JSON.stringify(q.modelAnswer)); return fnv1a(p.join('\u241F')); }
function examPerm(q){ return C.shuffleOptions(q.options.map(function(_,i){return i;}),App.rng); } // 冻结的原始下标排列 (持久化, 刷新可复原)
/* examInProgress 读写: iv=2 内部版本号(仅管此键); 仅 phase∈{answering,grading} 视为有效进行中 */
function readExam(){ const s=lsGet(nk('examInProgress'),null); if(!s||s.iv!==2) return null; if(s.phase!=='answering'&&s.phase!=='grading') return null; return s; }
function examResumable(){ return !!readExam(); }
function reconcileExam(){ const s=lsGet(nk('examInProgress'),null); if(s && s.iv!==2){ lsDel(nk('examInProgress')); } } // 旧格式硬作废(防陈旧隔离)
/* 计时: 累计在场时间 elapsedMs + 当前计时段起点 runningSince(暂停时为0) */
function examElapsed(){ const s=App.session; if(!s) return 0; return (s.elapsedMs||0)+(s.runningSince?(Date.now()-s.runningSince):0); }
function clockShouldRun(s){ return !!(s && ((s.mode==='exam' && s.phase==='answering') || s.mode!=='exam')); } // exam:仅答题阶段; 练习:整个 runner 期 (离页由 onVisibility 冻结 elapsed)
function pauseSessionClock(s){ if(s&&s.runningSince){ s.elapsedMs=(s.elapsedMs||0)+(Date.now()-s.runningSince); s.runningSince=0; if(s.mode==='exam') persistExam(); } }
function resumeSessionClock(s){ if(clockShouldRun(s) && !s.runningSince){ s.runningSince=Date.now(); } }
function onVisibility(){ const s=App.session; if(!s) return; if(document.hidden) pauseSessionClock(s); else resumeSessionClock(s); }

function startExam(){
  if(examResumable() && !confirm(t('examOverwriteConfirm'))) return; // 覆盖进行中的考试前确认
  const cfg=App.course.exam||{total:30,minSubjective:4,floatCount:1};
  const r=C.pickExamSet(App.questions,cfg,App.rng,App.recent);
  const s=newSession('exam',r.set,{shortfall:r.shortfall,counts:r.counts});
  if(!s) return;
  s.phase='answering'; s.elapsedMs=0; s.runningSince=Date.now();
  s.fp={}; s.list.forEach(function(q){ s.fp[q.id]=contentFp(q); });
  s.list.forEach(function(q){ const st=s.perItem[q.id]={ uncertain:false };
    if(q.type==='choice'){ st.perm=examPerm(q); st.picked=null; }
    else { st.raw=''; st.checked={}; st.evaluated=false; } });
  persistExam();
  renderRunner();
}
function serializePerItem(){ const s=App.session, o={};
  for(const id in s.perItem){ const p=s.perItem[id], e={ uncertain:!!p.uncertain };
    if(p.perm){ e.perm=p.perm; e.picked=(p.picked==null?null:p.picked); }
    else { e.raw=p.raw||''; e.checked=p.checked||{}; e.evaluated=!!p.evaluated; }
    o[id]=e; }
  return o;
}
function persistExam(){ const s=App.session; if(!s||s.mode!=='exam') return;
  lsSet(nk('examInProgress'),{ iv:2, phase:s.phase, ids:s.list.map(function(q){return q.id;}), pos:s.pos,
    elapsedMs:examElapsed(), fp:s.fp||{}, perItem:serializePerItem() });
}
function resumeExam(){
  const saved=readExam();
  if(!saved){ lsDel(nk('examInProgress')); toast(t('examInvalidated')); return renderHome(); }
  const list=saved.ids.map(function(id){ return App.idx.byId[id]; });
  let bad=list.some(function(q){ return !q; });
  if(!bad && saved.fp) bad=saved.ids.some(function(id){ const q=App.idx.byId[id]; return !q || contentFp(q)!==saved.fp[id]; });
  if(bad){ lsDel(nk('examInProgress')); toast(t('examInvalidated')); return renderHome(); } // 指纹失效: 整场作废
  const s=newSession('exam',list,{}); if(!s) return;
  s.phase=(saved.phase==='grading')?'grading':'answering';
  s.pos=Math.min(saved.pos||0,list.length-1); s.frontier=s.pos;
  s.elapsedMs=saved.elapsedMs||0; s.runningSince=(s.phase==='answering')?Date.now():0; s.fp=saved.fp||{};
  s.perItem={};
  list.forEach(function(q){ const sp=(saved.perItem&&saved.perItem[q.id])||{}, st=s.perItem[q.id]={ uncertain:!!sp.uncertain };
    if(q.type==='choice'){ st.perm=sp.perm||examPerm(q); st.picked=(sp.picked==null?null:sp.picked); }
    else { st.raw=sp.raw||''; st.checked=sp.checked||{}; st.evaluated=!!sp.evaluated; } });
  if(s.phase==='grading') renderGrading(); else renderRunner();
}

/* ---- 盲答阶段 (answering): 无判分 / 无解析 / 无概念入口; 仅选择与记入 + 不確かマーク ---- */
function renderExamAnswer(){

let examStripEl=null, examStripFor=null, examStripScroll=0; // 持久題号轨: 同一セッション内は再構築せず再利用しスクロール位置を維持 → 毎題リセット→smoothの「果凍」を根治
function examNavStrip(){ const s=App.session;
  if(examStripEl && examStripFor===s){ syncExamStrip(examStripEl); return examStripEl; } // 既存を再利用(scrollLeft維持); チップ状態のみ更新
  const strip=el('div',{class:'examstrip'});
  strip.appendChild(el('span',{class:'estrip-pad'})); // 先頭余白: 端の題も中央へ
  s.list.forEach(function(q,i){
    const chip=el('button',{class:'echip',text:String(i+1)});
    chip.addEventListener('click',function(){ if(i!==s.pos){ s.pos=i; persistExam(); qStep='none'; renderRunner(); } });
    strip.appendChild(chip); });
  strip.appendChild(el('span',{class:'estrip-pad'})); // 末尾余白
  examStripEl=strip; examStripFor=s; examStripScroll=0;
  syncExamStrip(strip); return strip;
}
function syncExamStrip(strip){ const s=App.session; if(!strip||!s) return; // チップの cur/done/unc を現状に同期(要素は使い回し)
  const chips=strip.querySelectorAll('.echip');
  s.list.forEach(function(q,i){ const st=s.perItem[q.id]||{}; const answered=(q.type==='choice')?(st.picked!=null):!!(st.raw&&st.raw.trim());
    const c=chips[i]; if(c) c.className='echip'+(i===s.pos?' cur':'')+(answered?' done':'')+(st.uncertain?' unc':''); });
}
function centerExamStrip(){ // 現在題を中央へ, 前位置から一格だけ滑らかにスクロール
  const strip=examStripEl; if(!strip||!strip.isConnected) return;
  const cur=strip.querySelector('.echip.cur'); if(!cur) return;
  const pad=Math.max(0, Math.round(strip.clientWidth/2 - cur.offsetWidth/2));
  strip.querySelectorAll('.estrip-pad').forEach(function(p){ if(p.style.width!==pad+'px') p.style.width=pad+'px'; });
  if(Math.abs(strip.scrollLeft-examStripScroll)>1) strip.scrollLeft=examStripScroll; // DOM移動でリセットされた位置を即復元 → smoothの起点を前回中央に
  const sr=strip.getBoundingClientRect(), cr=cur.getBoundingClientRect();
  const target=Math.max(0, Math.round(strip.scrollLeft + (cr.left-sr.left) - (strip.clientWidth/2 - cr.width/2)));
  const reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){ strip.scrollLeft=target; } else { strip.scrollTo({left:target, behavior:'smooth'}); }
  examStripScroll=target;
}
function examChoiceBody(q,st,body){ const wrap=el('div',{class:'opts'}); const perm=st.perm||(st.perm=examPerm(q));
  perm.forEach(function(oi){ const o=q.options[oi], sel=(st.picked===oi);
    const btn=el('button',{class:'opt jp'+(sel?' sel':'')},[ el('span',{class:'mk',text:sel?'●':''}), el('span',{text:o.t}) ]);
    btn.addEventListener('click',function(){ answerChoice(q,o); });

}
function examSubjectiveBody(q,st,body){ const wrap=el('div',{class:'ta-wrap'});

  ta.value=st.raw||'';
  ta.addEventListener('input',function(){ st.raw=ta.value; });

  wrap.appendChild(ta); body.appendChild(wrap);
}
function examUncertainToggle(q,st){ const on=!!st.uncertain;

function examAnswerNav(){ const s=App.session, row=el('div',{class:'examnav'});

/* ---- 批改阶段 (grading): 客观自动判 + 记述逐要点自评; 全部记述确定后方可定稿 ---- */
function renderGrading(){ const s=App.session; if(!s) return;
  clearRunnerTimer();
  let objCorrect=0,objTotal=0,subjTotal=0,subjEval=0;
  s.list.forEach(function(q){ const st=s.perItem[q.id]||{};
    if(q.type==='choice'){ objTotal++; if(C.gradeChoice(st.picked!=null?q.options[st.picked]:null)) objCorrect++; }
    else { subjTotal++; if(st.evaluated) subjEval++; } });
  const allEval=(subjEval===subjTotal);
  const wrap=el('div',{class:'grading'});
  wrap.appendChild(el('div',{class:'sechd'},[ el('h2',{class:'jp',text:t('gradingTitle')}), el('button',{class:'qhome jp',style:'margin-left:auto',text:t('home'),onclick:exitToHome}) ])); // 中断可(phase=grading 持久化 → 中断続行で復帰)
  wrap.appendChild(el('p',{class:'muted jp',text:t('gradingIntro')}));
  /* 上半区: 記述(自己採点・操作可) */
  if(subjTotal>0){ const sz=el('div',{class:'gzone subj'});
    sz.appendChild(el('div',{class:'gzhd jp'},[ el('span',{class:'gzt',text:typeLabel('subjective')}),
      el('span',{class:'gzp',text:t('gradingProgress').replace('{x}',subjEval).replace('{y}',subjTotal)}) ]));
    s.list.forEach(function(q,i){ if(q.type==='subjective') sz.appendChild(gradingCard(q,i)); });
    wrap.appendChild(sz); }
  /* 下半区: 客観(自動採点・読取専用); 全記述の採点確定まで結果を伏せる */
  if(objTotal>0){ const oz=el('div',{class:'gzone obj'});
    if(allEval){ oz.appendChild(el('div',{class:'gzhd jp'},[ el('span',{class:'gzt',text:typeLabel('choice')}),
        el('span',{class:'gzs',text:objCorrect+' / '+objTotal+' '+t('correct')}) ]));
      s.list.forEach(function(q,i){ if(q.type==='choice') oz.appendChild(gradingCard(q,i)); }); }
    else { oz.appendChild(el('div',{class:'gzlock jp'},[ el('span',{class:'gzt',text:typeLabel('choice')+'（'+objTotal+'）'}),
        el('p',{class:'gzlh',text:t('objHidden')}) ])); }
    wrap.appendChild(oz); }
  const foot=el('div',{class:'gradefoot'});
  foot.appendChild(el('div',{class:'gprog jp',text:t('gradingProgress').replace('{x}',subjEval).replace('{y}',subjTotal)}));
  const fin=el('button',{class:'btn',text:t('finalizeBtn'),onclick:finalizeExam}); if(!allEval){ fin.disabled=true; fin.title=t('finalizeLocked'); }
  foot.appendChild(fin); wrap.appendChild(foot);
  registerFrame(renderGrading,'examGrading'); setView(wrap);
}
function gradingCard(q,i){ const s=App.session, st=s.perItem[q.id]||{}, card=el('div',{class:'gcard'});
  card.appendChild(el('div',{class:'gqnum'},[ el('span',{class:'n',text:'Q.'+String(i+1).padStart(2,'0')}), el('span',{class:'mode',text:typeLabel(q.type)}) ]));
  card.appendChild(qtextNode(q.q));
  if(q.type==='choice'){
    const picked=(st.picked!=null)?q.options[st.picked]:null, correct=C.gradeChoice(picked);
    const opts=el('div',{class:'opts grading'}), perm=st.perm||q.options.map(function(_,k){return k;});
    perm.forEach(function(oi){ const o=q.options[oi], isP=(st.picked===oi), isC=!!o.correct;
      const cell=el('div',{class:'opt jp'+(isC?' ok':'')+(isP&&!isC?' no':'')},[ el('span',{class:'mk',text:isC?'✓':(isP?'✕':'')}), el('span',{text:o.t}) ]);
      if(isP) cell.appendChild(el('span',{class:'lbl',text:t('picked')}));
      opts.appendChild(cell); });
    card.appendChild(opts);
    if(st.picked==null) card.appendChild(el('div',{class:'gnote jp warn',text:t('examNoAnsWrong')}));
    card.appendChild(el('div',{class:'gres jp '+(correct?'ok':'no'),text:correct?t('correct'):t('wrong')}));
  } else {
    st.checked=st.checked||{};
    card.appendChild(el('div',{class:'ta-ro'},[ el('div',{class:'tl',text:t('yourAns')}), el('p',{text:(st.raw&&st.raw.trim())?st.raw:('('+t('examNoAns')+')')}) ]));
    card.appendChild(el('div',{class:'exblock model'},[ el('div',{class:'exhd',text:t('model')}), richExplain(L(q.modelAnswer)) ]));
    card.appendChild(el('div',{class:'rubt jp',text:t('rubricHint')}));
    q.rubric.forEach(function(rb,k){ const on=!!st.checked[k];
      const row=el('button',{class:'rb'+(on?' hit':'')},[ el('span',{class:'ck',text:on?'✓':''}),
        el('div',null,[ el('div',{class:'rt jp',text:L(rb.point)}), el('span',{class:'rc',text:(on?('✓ '+t('hitConcept')):('○ '+t('missConcept')))+' · '+rb.concept}) ]) ]);
      row.addEventListener('click',function(){ const y=window.scrollY; st.checked[k]=!st.checked[k]; persistExam(); renderGrading(); window.scrollTo(0,y); });
      card.appendChild(row); });
    const total=q.rubric.length, hit=Object.keys(st.checked).filter(function(k){return st.checked[k];}).length;
    const pct=Math.round(C.subjectivePercent(hit,total)*100);
    const lvlKey=(hit===total)?'full':(hit===0?'none':'part'), lvlTxt=(hit===total)?t('masteryFull'):(hit===0?t('masteryNone'):t('masteryPart'));
    card.appendChild(el('div',{class:'scoreline jp'},[ el('span',{class:'lvl '+lvlKey,text:lvlTxt}), document.createTextNode('　'+pct+'%（'+total+t('ofPoints')+'中 '+hit+'）') ]));
    const evb=el('button',{class:'btn sm'+(st.evaluated?' ghost':''),style:'margin-top:10px',text:st.evaluated?t('gradeConfirmed'):t('gradeConfirm')});
    evb.addEventListener('click',function(){ const y=window.scrollY; st.evaluated=true; persistExam(); renderGrading(); window.scrollTo(0,y); });
    card.appendChild(evb);
  }
  return card;
}

/* ---- 定稿 (finalized): 一次性延迟批改写入 + exams++ + 单次落盘; 仅此处清键解除隔离 ---- */
function flushExamToProgress(){ const s=App.session;
  s.list.forEach(function(q){ const st=s.perItem[q.id]||{};
    if(q.type==='choice'){ const picked=(st.picked!=null)?q.options[st.picked]:null, correct=C.gradeChoice(picked);
      st.correct=correct; st.answered=true;
      recordAttempt(q,{type:'choice',correct:correct,ans:{selectedOption:picked}},{defer:true});
    } else { const total=q.rubric.length, checked=st.checked||{};
      const hit=Object.keys(checked).filter(function(k){return checked[k];}).length, missed=[];
      q.rubric.forEach(function(rb,k){ if(!checked[k]) missed.push(rb.concept); });
      st.correct=(hit===total); st.percent=C.subjectivePercent(hit,total); st.missed=missed; st.answered=true;
      recordAttempt(q,{type:'subjective',correct:st.correct,percent:st.percent,ans:{checkedConcepts:[],missedConcepts:missed},raw:st.raw},{defer:true});
    } });
  App.progress.stats.exams=(App.progress.stats.exams||0)+1;
  saveProgress(); // 单次落盘
}
function finalizeExam(){ const s=App.session; if(!s||s.mode!=='exam') return;
  const pending=s.list.some(function(q){ return q.type==='subjective' && !(s.perItem[q.id]&&s.perItem[q.id].evaluated); });
  if(pending){ toast(t('finalizeLocked')); return; }
  flushExamToProgress();
  lsDel(nk('examInProgress'));
  const log=[]; s.list.forEach(function(q){ const st=s.perItem[q.id]; log.push({ id:q.id, type:q.type, correct:st.correct, ans:{ missedConcepts:st.missed } }); });
  const agg=C.aggregateWeakness(log,App.idx.byId);
  s.phase='finalized';
  baseHome(); App._bloom=false; renderResult(agg,s.list.length,s.list.length); showRestPop();
}

/* ---------- RUNNER ---------- */
const RENDER={ // 题型注册表(渲染侧); 未知 type 优雅跳过
  choice: renderChoiceBody,
  subjective: renderSubjectiveBody
};
const KEYS={ // 题型注册表(键盘侧); 走分发, 不写死两种, 未知 type 优雅跳过
  choice:{
    onDigit:function(q,n){ const s=App.session; const st=s.perItem[q.id]; if(!st) return false; if(s.mode==='exam'&&s.phase==='answering'){ const perm=st.perm; if(!perm||n>perm.length) return false; answerChoice(q,q.options[perm[n-1]]); return true; } if(st.answered) return false; const opts=st.order; if(!opts||n>opts.length) return false; answerChoice(q,opts[n-1]); return true; },
    onEnter:function(q){ const s=App.session; if(s.mode==='exam'&&s.phase==='answering'){ goNext(); return true; } const st=s.perItem[q.id]; if(st&&st.answered){ goNext(); return true; } return false; }
  },
  subjective:{
    onDigit:function(){ return false; }, // 记述题没有 1–4 选项: 不劫持、不崩溃
    onEnter:function(q){ const s=App.session; if(s.mode==='exam'&&s.phase==='answering'){ goNext(); return true; } const st=s.perItem[q.id]||(s.perItem[q.id]={}); if(!st.revealed){ st.revealed=true; st.checked=st.checked||{}; renderRunner(); return true; } goNext(); return true; }
  }
};
function onKey(e){
  if(e.key==='Escape'){ const root=document.getElementById('modalRoot'); if(root&&root.firstChild){ closeModal(); e.preventDefault(); } return; }
  const tg=(e.target&&e.target.tagName||'').toLowerCase();
  if(tg==='textarea'||tg==='input'||tg==='select'||(e.target&&e.target.isContentEditable)) return; // 输入中不劫持数字/回车
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  if(!App.session || !document.querySelector('.runner')) return; // 仅在答题视图生效
  const q=App.session.list[App.session.pos]; if(!q) return;
  const h=KEYS[q.type]; if(!h) return; // 未知题型: 优雅跳过(不崩溃)
  if(/^[1-9]$/.test(e.key)){ if(h.onDigit && h.onDigit(q,parseInt(e.key,10))) e.preventDefault(); }
  else if(e.key==='Enter'){ if(h.onEnter && h.onEnter(q)) e.preventDefault(); }
  else if(e.key==='ArrowLeft'){ if(App.session.pos>0){ goPrev(); e.preventDefault(); } }
  else if(e.key==='ArrowRight'){ if(App.session.mode==='exam'&&App.session.phase==='answering'){ if(App.session.pos<App.session.list.length-1){ goNext(); e.preventDefault(); } return; } const st=App.session.perItem[q.id]; const ready=(q.type==='choice'?(st&&st.answered):(st&&st.revealed))||App.session.pos<(App.session.frontier||0); if(ready){ goNext(); e.preventDefault(); } }
}
function exitToHome(){ pauseSessionClock(App.session); clearCareTimer(); clearRunnerTimer(); App.session=null; App.readerReturn=null; goHome(); } // §5-9(b): 離脱前に時計を停止=累計確定(exam は persist)。答題視図を離れれば累計停止 // ホーム = 常に主頁(手册発でも誤解を避ける); 上一頁(reader)は「戻る」で
function backToReader(){ const r=App.readerReturn; if(!r) return exitToHome(); pauseSessionClock(App.session); App.readerReturn=null; App.session=null; clearCareTimer(); clearRunnerTimer(); renderReader(r.kai,r.sec); }
function sessionBackBtn(){ return App.readerReturn ? el('button',{class:'qback jp',html:'‹ '+t('back'),onclick:backToReader}) : null; } // 手册発 session のみ左上に「戻る」
function renderRunner(){
  const s=App.session; if(!s) return;
  if(s.mode==='exam' && s.phase==='answering') return renderExamAnswer();
  const q=s.list[s.pos];
  if(!q){ return finishSession(); }
  const renderer=RENDER[q.type];
  const fromReader=!!(s.opts && s.opts.from==='reader'); // 手册発の演習は単一回 → 回レール(回1-12指示)が無意味なので外し, 全幅 + 戻るを真の左上へ
  const runner=el('div',{class:'runner'+(fromReader?' no-rail':'')});
  if(!fromReader) runner.appendChild(buildRail(q));
  const body=el('div',{class:'rbody'});
  // chrome
  const timerEl=(s.mode==='exam')?el('span',{class:'qtimer'}):null;
  body.appendChild(el('div',{class:'qhd'},[
    el('div',{class:'qhd-l'},[ sessionBackBtn(), el('div',{class:'crs jp'},[ document.createTextNode(modeLabel()), el('b',{text:L(App.course.title)}) ]) ]),
    timerEl,
    el('button',{class:'qhome jp',text:t('home'),onclick:exitToHome})
  ]));
  body.appendChild(el('div',{class:'qnum'},[
    el('span',{class:'n',text:'Q.'+String(s.pos+1).padStart(2,'0')}),
    el('span',{class:'mode',text:typeLabel(q.type)}),
    el('span',{class:'prog',text:String(s.pos+1).padStart(2,'0')+' / '+s.list.length})
  ]));
  body.appendChild(qtextNode(q.q));
  if(renderer){ renderer(q,body,s.pos<(s.frontier||0)); }
  else { // 未知题型: 优雅降级
    if(App.dev) console.warn('未知 type, 跳过渲染:',q.type);
    body.appendChild(el('p',{class:'muted',text:'(unsupported question type: '+q.type+')'}));
    body.appendChild(el('button',{class:'btn sm',style:'margin-top:12px',text:t('next'),onclick:goNext}));
  }
  if(qStep!=='none'){ body.classList.add(qStep==='next'?'qstep-next':'qstep-prev'); qStep='none'; }
  runner.appendChild(body);
  registerFrame(renderRunner,'runner'); // 先注册帧(定方向), 再 setView(套动画)
  setView(runner);
  clearRunnerTimer();
  if(timerEl) startRunnerTimer(timerEl);
}
function modeLabel(){ const m=App.session.mode; return m==='exam'?t('modeExam'):m==='wrong'?t('modeWrong'):m==='weak'?t('modeWeak'):t('modeReview'); }
function typeLabel(type){ return type==='subjective'?(App.lang==='ja'?'記述式':'记述式'):(App.lang==='ja'?'選択式':'选择式'); }

function buildRail(currentQ){
  const rail=el('div',{class:'rail'},[ el('div',{class:'rk',text:'回'}) ]);
  App.idx.kais.forEach(function(kai){
    const ids=App.idx.kaiToQuestions[kai]||[];
    const allSeen=ids.length>0 && ids.every(id=>App.progress.seen[id]);
    const tab=el('div',{class:'tab'+(kai===currentQ.kai?' on':''),text:String(kai)});
    if(allSeen) tab.appendChild(el('span',{class:'done',text:'✓'}));
    rail.appendChild(tab); // 答題中は現在地の表示のみ（クリック不可）
  });
  return rail;
}

/* choice */
function renderChoiceBody(q,body){
  const s=App.session; const st=s.perItem[q.id]||(s.perItem[q.id]={});
  const opts = st.order || (st.order=C.shuffleOptions(q.options,App.rng));
  const optsWrap=el('div',{class:'opts'});
  opts.forEach(function(o){
    const btn=el('button',{class:'opt jp'},[ el('span',{class:'mk'}), el('span',{text:o.t}) ]);
    if(st.answered){
      btn.disabled=true;
      if(o.correct){ btn.classList.add('ok'); btn.querySelector('.mk').textContent='✓'; btn.appendChild(el('span',{class:'lbl',text:t('correct')})); }
      else if(st.picked===o){ btn.classList.add('no'); btn.querySelector('.mk').textContent='✕'; btn.appendChild(el('span',{class:'lbl',text:t('wrong')+t('picked')})); }
    } else {
      btn.addEventListener('click',function(){ answerChoice(q,o); });
    }
    optsWrap.appendChild(btn);
  });
  body.appendChild(optsWrap);
  if(st.answered){
    if(s._pulse && s._pulse.id===q.id){ const tgt=s._pulse.kind==='ok'?optsWrap.querySelector('.opt.ok'):optsWrap.querySelector('.opt.no'); if(tgt) tgt.classList.add(s._pulse.kind==='ok'?'settle':'nudge'); s._pulse=null; }
    body.appendChild(buildReveal(q,false));
  }
}
function answerChoice(q,o){
  const s=App.session;
  if(s.mode==='exam' && s.phase==='answering'){ const est=s.perItem[q.id]||(s.perItem[q.id]={uncertain:false}); const oi=q.options.indexOf(o); est.picked=(est.picked===oi)?null:oi; persistExam(); renderRunner(); return; }
  const st=s.perItem[q.id];
  const correct=C.gradeChoice(o);
  st.answered=true; st.picked=o; st.correct=correct;
  s.streak = correct ? ((s.streak||0)+1) : 0;
  s.answeredCount=(s.answeredCount||0)+1; s.recentWindow=s.recentWindow||[]; s.recentWindow.push(!!correct); if(s.recentWindow.length>8) s.recentWindow.shift(); // care:里程碑 + 错误聚集窗
  recordAttempt(q,{type:'choice',correct:correct,ans:{selectedOption:o}});
  pushRecent(q.id);
  if(s.mode!=='exam') s._pulse={id:q.id,kind:correct?'ok':'no'}; // 练习即时反馈; 模考不置
  if(s.mode==='exam') persistExam();
  keepScroll=true; renderRunner(); // 练习揭示就地展开 → 保位不滚顶 (修「滚动后点选项」顶栏闪 + 不跳回顶部)
}

/* subjective */
function renderSubjectiveBody(q,body,readOnly){
  const s=App.session; const st=s.perItem[q.id]||(s.perItem[q.id]={});
  if(!st.revealed && !readOnly){
    const wrap=el('div',{class:'ta-wrap'});
    const ta=el('textarea',{class:'answer jp',placeholder:App.lang==='ja'?'ここに自分の解答を書いてから「答え合わせ」':'先在这里写下你的解答，再「对答案」'});
    ta.value=st.raw||'';
    ta.addEventListener('input',()=>{ st.raw=ta.value; });
    wrap.appendChild(ta);
    body.appendChild(wrap);
    body.appendChild(el('button',{class:'btn',text:t('reveal'),onclick:function(){ st.revealed=true; st.raw=ta.value; st.checked=st.checked||{}; if(s.mode!=='exam'){ s.answeredCount=(s.answeredCount||0)+1; } keepScroll=true; renderRunner(); }}));
    return;
  }
  // revealed
  if(st.raw && st.raw.trim()) body.appendChild(el('div',{class:'ta-ro'},[ el('div',{class:'tl',text:t('yourAns')}), el('p',{text:st.raw}) ]));
  body.appendChild(el('div',{class:'exblock model',style:'margin-top:6px'},[ el('div',{class:'exhd',text:t('model')}), richExplain(L(q.modelAnswer)) ]));
  body.appendChild(el('div',{class:'rubt jp',text:t('rubricHint')}));
  st.checked=st.checked||{};
  q.rubric.forEach(function(rb,i){
    const on=!!st.checked[i];
    const row=el('button',{class:'rb'+(on?' hit':'')},[
      el('span',{class:'ck',text:on?'✓':''}),
      el('div',null,[ el('div',{class:'rt jp',text:L(rb.point)}),
        el('span',{class:'rc',text:(on?'✓ '+t('hitConcept'):'○ '+t('missConcept'))+' · '+rb.concept}) ])
    ]);
    if(!readOnly) row.addEventListener('click',function(){ const y=window.scrollY; st.checked[i]=!st.checked[i]; commitSubjective(q); renderRunner(); window.scrollTo(0,y); });
    body.appendChild(row);
  });
  const total=q.rubric.length, hit=Object.values(st.checked).filter(Boolean).length;
  const pct=Math.round(C.subjectivePercent(hit,total)*100);
  body.appendChild(el('div',{class:'scoreline jp'},[ document.createTextNode(t('achieve')+'  '), el('b',{text:pct+'%'}), document.createTextNode('  （'+total+t('ofPoints')+'中 '+hit+'）') ]));
  body.appendChild(buildReveal(q,false));
}
function commitSubjective(q){
  const s=App.session; const st=s.perItem[q.id];
  const total=q.rubric.length, hit=Object.values(st.checked).filter(Boolean).length;
  const missed=[]; q.rubric.forEach((rb,i)=>{ if(!st.checked[i]) missed.push(rb.concept); });
  st.percent=C.subjectivePercent(hit,total); st.missed=missed; st.correct=(hit===total); st.answered=true;
  recordAttempt(q,{type:'subjective',correct:st.correct,percent:st.percent,ans:{checkedConcepts:[],missedConcepts:missed},raw:st.raw});
  pushRecent(q.id);
  if(s.mode==='exam') persistExam();
}

/* reveal layer (breadcrumb + tags + explain + provenance) */
function pick(arr){ return (Array.isArray(arr)&&arr.length)?arr[Math.floor(Math.random()*arr.length)]:''; }
function greetMsg(){ const p=t('greetPool'); return (Array.isArray(p)&&p.length)?pick(p):t('greet'); } // §5-4/8: 挨拶を単条→池からランダム
function feedbackNode(q){ // 做对鼓励 / 做错安慰 / 连对更高奖励（仅选择题, 对错清晰）
  if(!App.session || q.type!=='choice') return null;
  const st=App.session.perItem[q.id]; if(!st||!st.answered) return null;
  let msg, tone;
  if(st.correct){
    const streak=App.session.streak||0;
    if(streak>=5){ msg=pick(t('encStreakHi')).replace('{n}',streak); tone='hi'; }
    else if(streak>=3){ msg=pick(t('encStreak')).replace('{n}',streak); tone='hi'; }
    else { msg=pick(t('encCorrect')); tone='ok'; }
  } else { msg=pick(t('encWrong')); tone='no'; }
  return el('div',{class:'fbk '+tone},[ el('span',{class:'jp',text:msg}) ]);
}
function buildReveal(q,noAnim){
  const wrap=el('div',{class:'reveal'+(noAnim?'':' anim')});
  const fb=feedbackNode(q); if(fb) wrap.appendChild(fb);
  wrap.appendChild(el('div',{class:'revcap',text:t('afterReveal')}));
  // breadcrumb: 課程 › 回x section › topic › concept
  const crumb=el('div',{class:'crumb'},[ el('span',{class:'jp2',text:App.lang==='ja'?'コース':'课程'}), el('span',{class:'sep',text:'›'}),
    el('b',{text:'回'+q.source.kai}), el('span',{class:'jp2',text:(q.source.section||'')}) ]);
  if(q.topic){ crumb.appendChild(el('span',{class:'sep',text:'›'})); crumb.appendChild(el('span',{class:'jp2',text:q.topic})); }
  if(q.concepts&&q.concepts[0]){ crumb.appendChild(el('span',{class:'sep',text:'›'})); crumb.appendChild(el('b',{text:q.concepts[0]})); }
  wrap.appendChild(crumb);
  wrap.appendChild(el('div',{class:'tags'},[ el('span',{class:'tag kind',text:q.kind}), q.topic?el('span',{class:'tag',text:q.topic}):null ]));
  // explanation tiers: 簡短解説(常時) / 詳しい解説・紛らわしい点(折りたたみ)
  if(q.explainShort||q.explainLong){
    const exw=el('div',{class:'exwrap'});
    if(q.explainShort) exw.appendChild(el('div',{class:'exblock short'},[ el('div',{class:'exhd',text:t('explain')}), richExplain(L(q.explainShort)) ]));
    if(q.explainLong){
      const inner=el('div',{class:'exblock long'},[ el('div',{class:'exhd',text:t('exLong')}), richExplain(L(q.explainLong)) ]);
      const block=el('div',{class:'excol'},[ el('div',{class:'excol-in'},[ inner ]) ]);
      const tog=el('button',{class:'exmore',text:t('detail')});
      tog.addEventListener('click',function(){ const open=block.getAttribute('data-open')==='true'; block.setAttribute('data-open',open?'false':'true'); tog.classList.toggle('open',!open); });
      exw.appendChild(tog); exw.appendChild(block);
    }
    wrap.appendChild(exw);
  }
  // provenance trail
  const cs=[]; (q.concepts||[]).forEach(c=>cs.push(c)); (q.rubric||[]).forEach(rb=>{ if(rb.concept&&cs.indexOf(rb.concept)<0) cs.push(rb.concept); });
  if(cs.length){
    const trail=el('div',{class:'trail'},[ el('div',{class:'tt',text:t('origin')}) ]);
    cs.forEach(function(c){
      const meta=App.idx.conceptMeta[c];
      const step=el('div',{class:'step'},[ el('span',{class:'dot'}) ]);
      if(meta&&meta.exists){
        const nm=el('button',{class:'cn jp',style:'background:none;border:none;padding:0;cursor:pointer;text-align:left',text:c});
        nm.addEventListener('click',()=>renderConcept(c,{from:'runner'}));
        step.appendChild(nm);
        step.appendChild(el('span',{class:'og',text:'回'+meta.origin.kai+' · '+(meta.origin.section||'').split(' ')[0]}));
      } else {
        step.appendChild(el('span',{class:'cn jp dis',text:c, title:t('conceptMissing')}));
      }
      trail.appendChild(step);
    });
    wrap.appendChild(trail);
  }
  const bmOn=isBookmarked(q.id);
  const bm=el('button',{class:'bmstar'+(bmOn?' on':''),style:'margin-top:14px'},[ svgNode(NEW_ICONS.star), el('span',{class:'jp',text:bmOn?t('booked'):t('bookmark')}) ]);
  bm.addEventListener('click',function(){ const now=toggleBookmark(q.id); bm.classList.toggle('on',now); bm.querySelector('span:last-child').textContent=now?t('booked'):t('bookmark'); });
  wrap.appendChild(bm);
  wrap.appendChild(navRowNode());
  return wrap;
}
function goNext(){
  const s=App.session;
  if(s.mode==='exam'){ if(s.pos<s.list.length-1){ s.pos++; if(s.frontier==null||s.pos>s.frontier) s.frontier=s.pos; persistExam(); qStep='next'; renderRunner(); } return; }
  const np=s.pos+1; if(np>(s.frontier||0)) s.frontier=np;
  if(s.pos<s.list.length-1){ s.pos=np; qStep='next'; renderRunner(); }
  else finishSession();
}
function goPrev(){ const s=App.session; if(s.pos>0){ s.pos--; if(s.mode==='exam') persistExam(); qStep='prev'; renderRunner(); } }

/* ---------- record attempt -> progress (seen/wrong/weakness/attempts) ---------- */
function recordAttempt(q,info,opt){
  App.progress.seen[q.id]=true;
  const wasWrong = info.correct!==true;
  if(wasWrong) App.progress.wrong[q.id]=true; else delete App.progress.wrong[q.id];
  // weakness via core extractor
  const h=C.types[q.type];
  if(h){ const cs=h.weaknessExtract(q,info.ans,info.correct)||[]; cs.forEach(c=>{ App.progress.weakness[c]=(App.progress.weakness[c]||0)+1; }); }
  App.progress.attempts.push({id:q.id,type:q.type,correct:info.correct,percent:info.percent,at:Date.now(),
    missedConcepts:info.ans&&info.ans.missedConcepts, rawAnswer:info.raw});
  if(App.progress.attempts.length>2000) App.progress.attempts.splice(0,App.progress.attempts.length-2000);
  if(!(opt&&opt.defer)) saveProgress();
}

/* ---------- finish session -> result ---------- */
function finishSession(){
  clearCareTimer(); clearRunnerTimer();
  const s=App.session;
  const log=[]; s.list.forEach(function(q){ const st=s.perItem[q.id]; if(st&&st.answered){
    log.push({id:q.id,type:q.type,correct:st.correct,ans:{missedConcepts:st.missed}}); } });
  const agg=C.aggregateWeakness(log,App.idx.byId);
  if(s.mode==='exam'){ App.progress.stats.exams=(App.progress.stats.exams||0)+1; saveProgress(); lsDel(nk('examInProgress')); }
  baseHome(); // 结果坐落在 [home, result]: 返回回首页(无法退回已结束的答题)
  if(s.mode!=='exam') App._bloom=true; // 练习结果径向; 模考安静
  renderResult(agg,log.length,s.list.length);
  showRestPop();
}
function renderResult(agg,answered,total){
  registerFrame(function(){ renderResult(agg,answered,total); },'result');
  const correct=agg.totals.correct, pct=answered?Math.round(correct/answered*100):0;
  const kids=[];
  kids.push(el('div',{class:'sechd'},[ el('h2',{class:'jp',text:App.session.mode==='exam'?t('examDone'):t('sessionDone')}) ]));
  const card=el('div',{class:'card'});
  const bloom=App._bloom; App._bloom=false; // 一次性消费: 语言重放/返回结果页不重播
  card.appendChild(el('div',{class:'bigscore'+(bloom?' bloom':'')},[ el('span',{class:'pct',text:pct+'%'}),
    el('span',{class:'frac',text:correct+' / '+answered+'  '+t('score')}) ]));
  card.appendChild(el('div',{class:'statgrid'},[

/* ---------- WRONG + WEAK merged hub (v1.6.0): 間違い + 苦手 を一つの枢に, 分段切替, 両視図の内容は原様流用 ---------- */
function wrongBodyNodes(){ // 「間違い」子視図の本体 (旧 renderWrong 本体; sectionHead/registerFrame/setView を除く, 内容不変)
  const ids=Object.keys(App.progress.wrong);
  if(!ids.length){ return [ el('div',{class:'card'},[ el('p',{class:'muted jp',text:t('wrongNone')}) ]) ]; }
  const out=[];
