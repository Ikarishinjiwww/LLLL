'use strict';

/* ---------- go ---------- */
/* fixed 顶栏高度 → --topbar-h (body padding-top 用): 实测而非写死, 覆盖 Zen Maru 字体晚加载变高、移动端按钮换行、窗口缩放。ResizeObserver 在顶栏尺寸变动时即时更新; 退化到 resize 监听 + fonts.ready */
(function syncTopbarH(){
  var tb=document.querySelector('.topbar'); if(!tb) return;
  var apply=function(){ document.documentElement.style.setProperty('--topbar-h', tb.offsetHeight+'px'); };
  apply();
  if(window.ResizeObserver){ try{ new ResizeObserver(apply).observe(tb); }catch(e){ window.addEventListener('resize',apply); } }
  else { window.addEventListener('resize',apply); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(apply).catch(function(){}); }
})();
document.addEventListener('touchstart', function(){}, {passive:true}); // v1.3.1 iOS: 空 touchstart 监听(遗留; 现按压反馈改走下方 pointer 委托, 更可靠)
/* 按压反馈(pointer 驱动 · 案C press 语法): iOS :active 靠空 touchstart「哄」出来不可靠, 且 transition 处理易让快速点按看不见。改用 pointerdown 加 .is-pressed、pointerup/cancel 去掉 → 跨鼠标/触屏一致, 且合成事件可验证。 */
(function(){
  var PRESS_SEL='.btn,.opt,.tb-btn,.lang button,.chip,.wkchip,.segbtn,.fcm,.echip,.fchip,.bgo,.cde,.listrow,.ktile,.card2,.rdr-aa,.rdr-bm,.rdr-back,.rdr-pager button,.modal-x,.brand,.fcta,.subcard,.rtile,.kt,.hsw-b,.rprac-cta,.qbm,.qback,.qhome,.back,.mcChip,.mcOpt,.meiFloat,.mcX,.greetsub,.cta,.cta-link'
    +',.nh-k,.nh-sb,.nh-sig,.nh-cv,.nh-exam,.nh-cont,.srow,.sgs-i,.sf-i,.cm-lk,.cm-main,.cm-a,.rxchip,.rc-zoom,.mc-send,.rc-ref';  /* v1.7.0 神経の新組件。登録漏れ=押圧が効かない(既知バグの再発) */ // 換代組件を全員登録(押圧効果が新組件に効かないバグの根治)
  function unpress(){ var els=document.querySelectorAll('.is-pressed'); for(var i=els.length-1;i>=0;i--) els[i].classList.remove('is-pressed'); }
  document.addEventListener('pointerdown', function(e){ var t=e.target && e.target.closest ? e.target.closest(PRESS_SEL) : null; if(t && !t.disabled) t.classList.add('is-pressed'); }, {passive:true});
  document.addEventListener('pointerup', unpress, {passive:true});
  document.addEventListener('pointercancel', unpress, {passive:true});
  window.addEventListener('blur', unpress);
})();
boot();
try{ meiInit(); }catch(e){} // მეიმეიトーク浮動入口(非主入口)
</script>
